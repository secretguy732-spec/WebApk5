name: Build HTML to APK (Cordova)
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18' }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - run: npm install -g cordova
      - run: |
          cordova create build com.testimeweb.testi App
          cp www/index.html build/www/index.html
          cp config.xml build/config.xml
          cd build && cordova platform add android && cordova build android
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/platforms/android/app/build/outputs/apk/debug/app-debug.apk